<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
  <link rel="stylesheet" href="registro.css" />
</head>

<body>

<div class="fondo"></div>

<div class="formulario">
  <h2>Crea una cuenta</h2>

  <br><br><br><br><br><br><br><br><br><br>

  <div class="bloque focus">
    <input id="nombre" type="text" placeholder="Nombre" style="margin-bottom: 10px" />
    <input id="apellido" type="text" placeholder="Apellido" style="margin-bottom: 10px" />
  </div>

  <div class="bloque focus">
    <label>Fecha de Nacimiento </label>
    <input id="fecha" type="text" placeholder="dd/mm/aaaa" required>
  </div>

  <div class="genero">
    <label><input type="radio" name="genero" value="Mujer" /> Mujer</label>
    <label><input type="radio" name="genero" value="Hombre" /> Hombre</label>
  </div>

  <div class="bloque focus">
    <input id="usuario" type="email" placeholder="Correo o celular" style="margin-bottom: 10px" />
    <input id="password" type="password" placeholder="Contraseña" style="margin-bottom: 10px" />
  </div>

  <p class="texto-informativo">
    Es posible que las personas que usan nuestro servicio hayan subido tu
    información de contacto. <a href="#">Más información.</a>
  </p>

  <p class="condiciones">
    Al hacer clic en "Registrarte", aceptas nuestras
    <a href="#">Condiciones</a>, la <a href="#">Política de privacidad</a> y
    la <a href="#">Política de cookies</a>.
  </p>

  <!-- ✅ BOTÓN CORREGIDO -->
  <button class="registro-btn" onclick="registrar()">Registrarte</button>

  <div class="ya-cuenta">
    <a href="inicio-sesion1.html">¿Ya tienes una cuenta?</a>
  </div>
</div>

<br>

<div class="imagen">
  <img src="logosinfondo..png" alt="">
</div>

<!-- ✅ SCRIPT FUNCIONAL -->
<script>
function registrar() {
  const usuario = document.getElementById('usuario').value;
  const password = document.getElementById('password').value;

  if (!usuario || !password) {
    alert("Completa los campos");
    return;
  }

  fetch('http://localhost:3000/register', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      usuario: usuario,
      password: password
    })
  })
  .then(res => {
  if (!res.ok) {
    throw new Error("Error en el servidor");
  }
  return res.text();
})
.then(data => {
  alert(data);
  window.location.href = "./index.html";
})
.catch(error => {
  console.error(error);
  alert("Error al registrar");
});
}
</script>

</body>
</html>
